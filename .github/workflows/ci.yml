name: URHYNIX CI (최소)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # 시크릿만 점검. 다른 건 다 풀어둠.
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run secret-scan
        run: |
          chmod +x .claude/skills/secret-scan/scan.sh
          bash .claude/skills/secret-scan/scan.sh

